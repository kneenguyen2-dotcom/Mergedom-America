<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mergedom: America</title>
<style>

/* Main page setup */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1220;
  color: white;
}

/* Top banner */
#topBanner {
  width: 100%;
  text-align: center;
  padding: 18px 0;
  font-size: 26px;
  font-weight: bold;
  background: #141a2d;
  border-bottom: 1px solid #2a3358;
}

/* Main layout */
#mainContainer {
  display: flex;
  justify-content: flex-start;
  align-items: flex-start;
  gap: 20px;
  padding: 70px 20px 40px 160px;
}

/* Workspace */
#workspace {
  flex-grow: 1;   
  position: relative;
  transform: translateY(-25px);
  height: 78vh;
  border: 2px dashed #444;
  border-radius: 12px;
  background: #151a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 500px; 
}
#workspace::after {
  content: "Drag elements here";
  color: #666;
  font-size: 18px;
}

/* Side panel */
#sidePanel {
  width: 180px;
  height: 78vh;
  transform: translateY(-25px);
  background: #1a1f35;
  border-radius: 12px;
  margin-left: 20px;
  overflow-y: auto;
  padding: 0 6px 6px 6px; 
  display: flex;
  flex-direction: column;
}
#sidePanel h3 {
  position: sticky;
  top: 0;
  z-index: 20; 
  background: #1a1f35; 
  text-align: center;
  margin: 0;
  padding: 12px 0;
  font-size: 18px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 10px;
}

/* Draggable elements */
.element {
  background: #4a6cf7;
  border-radius: 12px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  cursor: grab;
  font-weight: bold;
  user-select: none;
  box-shadow: 0 5px 0 #2c3ea8;
}
.element:hover {
  background: #5b7dff;
  transform: translateY(-2px);
  box-shadow: 0 8px 0 #2c3ea8;
}
.element:active {
  transform: translateY(2px);
  box-shadow: 0 3px 0 #2c3ea8;
}

/* Placed tiles */
.tile {
  position: absolute;
  padding: 10px 14px;
  background: #4a6cf7;
  border-radius: 10px;
  cursor: grab;
  user-select: none;
  font-weight: bold;
}
.tile:active {
  cursor: grabbing;
}

/* Result text */
#result {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #aaa;
}

/* Menu tiles */
.menuTile {
  width: 100%;
  height: 70px;
  background: #2d3b66;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
  box-shadow: 0 6px 0 #1c274a;
  border: 2px solid rgba(255,255,255,0.08);
  transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease;
}
.menuTile:hover {
  background: #3f56a0;
  transform: translateY(-2px);
  box-shadow: 0 8px 0 #1c274a;
}
.menuTile:active {
  transform: translateY(2px);
  box-shadow: 0 3px 0 #1c274a;
}

/* Erase button */
#eraseTile {
  background: #d9534f;
  box-shadow: 0 6px 0 #8f2f2c;
}
#eraseTile:hover {
  background: #ff6b6b;
  box-shadow: 0 8px 0 #8f2f2c;
}

/* Menu buttons */
#menuButtons {
  position: fixed;
  top: 90px;
  left: 20px;
  height: calc(100vh - 110px);
  width: 110px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
}
.modalContent {
  width: 500px;
  height: 360px;
  background: #1a1f35;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 10px 0 #0d1020;
  border: 2px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* Settings */
.settingsPanel {
  width: 550px;
  height: 420px;
  background: #1a1f35;
  border-radius: 14px;
  padding: 30px;
  box-shadow: 0 10px 0 #0d1020;
  border: 2px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  font-size: 20px; /* 🔥 bigger base font */
  text-align: center;
}
.settingItem {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-size: 18px;
}
.settingsButton {
  padding: 14px 18px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #2d3b66;
  color: white;
  font-weight: bold;
  width: 90%; /* 🔥 makes it feel like a full control bar */
  transition: transform 0.1s ease, background 0.2s ease;
}
.settingsButton:hover {
  background: #3f56a0;
  transform: scale(1.02);
}
.settingsButton.danger {
  background: #d9534f;
}
.settingsButton.danger:hover {
  background: #ff6b6b;
}

/* Volume */
#volumeSlider {
  width: 90%;
  height: 6px;
}

/* Account */
.accountPanel {
  width: 500px;
  height: 380px;
  background: #1a1f35;
  border-radius: 14px;
  padding: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  color: white;
  text-align: center;
}
#accountStatus {
  font-size: 16px;
  opacity: 0.8;
}
.accountPanel input {
  width: 80%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}
.accountButtons {
  display: flex;
  gap: 10px;
}
.accountButtons button {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #2d3b66;
  color: white;
  font-weight: bold;
}
.accountButtons button:hover {
  background: #3f56a0;
}

/* Encyclopedia */
.encyclopediaPanel {
  width: 500px;
  height: 420px;
  background: #1a1f35;
  border-radius: 14px;
  padding: 25px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  overflow: hidden;
}
#encyclopediaList {
  width: 100%;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-right: 5px;
}
.encyclopediaItem {
  background: #2d3b66;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}
.encyclopediaItem:hover {
  background: #3f56a0;
}

</style>
</head>
<body>

<!-- Top banner -->
<div id="topBanner">
  Mergedom: America
</div>

<!-- Menu buttons -->
<div id="menuButtons">
  <div class="menuTile" onclick="openModal('accountModal')">Account</div>
  <div class="menuTile" onclick="openModal('encyclopediaModal')">Encyclopedia</div>
  <div style="flex: 1;"></div>
  <div class="menuTile" onclick="openModal('settingsModal')">Settings</div>
  <div id="eraseTile" class="menuTile" onclick="clearWorkspace()">Erase</div>

<!-- Main layout -->
</div>
<div id="mainContainer">
  <div id="workspace"></div>
  <div id="sidePanel">
    <h3>Elements</h3>
    <div id="elementsContainer"></div>
  </div>
</div>

<!-- Settings modal -->
<div id="settingsModal" class="modal" onclick="closeModal(event,'settingsModal')">
  <div class="modalContent settingsPanel">
    <h2>Settings</h2>

    <!-- Volume -->
    <div class="settingItem">
      <label>Music Volume</label>
      <input type="range" min="0" max="100" value="50" id="volumeSlider">
    </div>

    <!-- Theme -->
    <div class="settingItem">
      <label>Theme</label>
      <button onclick="toggleTheme()" class="settingsButton">
        Toggle Dark / Light Mode
      </button>
    </div>

     <!-- Reset -->
    <div class="settingItem">
      <label>Progress</label>
      <button onclick="resetProgress()" class="settingsButton danger">
        Reset Progress
      </button>
    </div>
  </div>
</div>

<!-- Encyclopedia modal -->
<div id="encyclopediaModal" class="modal" onclick="closeModal(event,'encyclopediaModal')">
  <div class="modalContent" style="flex-direction: column; align-items: stretch;">
    <h2>📖 Encyclopedia</h2>
    <div id="encyclopediaList" style="overflow-y:auto; height: 100%; width: 100%;"></div>
  </div>
</div>

<!-- Account modal -->
<div id="accountModal" class="modal" onclick="closeModal(event,'accountModal')">
  <div class="modalContent accountPanel">
    <h2>Account</h2>
    <!-- Status -->
    <div id="accountStatus">Not logged in</div>
    <!-- Inputs -->
    <input type="text" id="usernameInput" placeholder="Enter username">
    <input type="password" id="passwordInput" placeholder="Enter password">

    <!-- Actions -->
    <div class="accountButtons">
      <button onclick="signup()">Sign Up</button>
      <button onclick="login()">Log In</button>
      <button onclick="logout()">Log Out</button>
    </div>
  </div>
</div>

<script>
let combineLock = false;

/* Modal open */
function openModal(id){
  document.getElementById(id).style.display = "flex";
  if (id === "encyclopediaModal") {
    loadEncyclopedia();
  }
}

/* Modal close */
function closeModal(e,id){
  if(e.target.classList.contains("modal")){
    document.getElementById(id).style.display="none";
  }
}

/* Clear workspace */
function clearWorkspace() {
  if (!confirm("Erase all placed elements?"))
    return;
  const workspace = document.getElementById("workspace");
  workspace.innerHTML = "";
  workspace.querySelectorAll(".element").forEach(el => el.remove());
  console.log("Workspace cleared");
}

/* Theme toggle */
function toggleTheme() {
  document.body.classList.toggle("light-mode");
}

/* Light mode styles */
const lightStyle = document.createElement("style");
lightStyle.innerHTML = `
body.light-mode {
  background: #f2f2f2;
  color: #111;
}
body.light-mode #workspace {
  background: #ffffff;
  border-color: #ccc;
}
body.light-mode #sidePanel {
  background: #e8e8e8;
}
body.light-mode .menuTile {
  background: #dddddd;
  color: black;
}
`;
document.head.appendChild(lightStyle);

/* Reset progress */
function resetProgress() {
  if (confirm("Reset all progress? This cannot be undone.")) {
    localStorage.clear();
    location.reload();
  }
}

</script>
<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* Supabase setup */
const supabaseUrl = "https://ddbiqoyucdjxwauwytla.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkYmlxb3l1Y2RqeHdhdXd5dGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDA2MTMsImV4cCI6MjA5MjQ3NjYxM30.wCRnticq4Bgce6AyAvKbwgugILZsUFWlGjUxph382pI";
const supabase = createClient(supabaseUrl, supabaseKey);

/* Signup */
window.signup = async function () {
  const email = document.getElementById("usernameInput").value;
  const password = document.getElementById("passwordInput").value;
  const { error } = await supabase.auth.signUp({
    email,
    password
  });
if (error) {
  console.log("FULL ERROR:", error);
  alert(JSON.stringify(error, null, 2));
}
};

/* Login */
window.login = async function () {
  const email = document.getElementById("usernameInput").value;
  const password = document.getElementById("passwordInput").value;
  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });
  if (error) {
    alert(error.message);
    return;
  }
  document.getElementById("accountStatus").innerText =
    "Logged in as: " + data.user.email;
};

/* Logout */
window.logout = async function () {
  await supabase.auth.signOut();
  document.getElementById("accountStatus").innerText = "Not logged in";
};

/* Auth listener */
supabase.auth.onAuthStateChange((event, session) => {
  console.log("AUTH EVENT:", event, session);
});

/* Auth UI update */
supabase.auth.onAuthStateChange((event, session) => {
  if (session?.user) {
    document.getElementById("accountStatus").innerText =
      "Logged in as: " + session.user.email;
  } else {
    document.getElementById("accountStatus").innerText =
      "Not logged in";
  }
});

/* Encyclopedia cache */
let encyclopediaCache = [];

/* Load encyclopedia */
window.loadEncyclopedia = async function () {
  const list = document.getElementById("encyclopediaList");
  list.innerHTML = "Loading...";
  const { data, error } = await supabase
    .from("elements")
    .select("element_name, category, description")
    .order("id", { ascending: true })
    .limit(10);
  if (error) {
    console.error(error);
    list.innerHTML = "Failed to load encyclopedia.";
    return;
  }
  list.innerHTML = "";
  data.forEach(el => {
    const div = document.createElement("div");
    div.style.padding = "10px";
    div.style.marginBottom = "10px";
    div.style.background = "#2d3b66";
    div.style.borderRadius = "10px";
    div.innerHTML = `
      <strong>${el.element_name}</strong><br>
      <small>${el.category || "Unknown"}</small><br>
      <span>${el.description || "No description"}</span>
    `;
    list.appendChild(div);
  });
  encyclopediaCache.forEach(el => {
    const div = document.createElement("div");
    div.style.padding = "10px";
    div.style.marginBottom = "10px";
    div.style.background = "#2d3b66";
    div.style.borderRadius = "10px";
    div.innerHTML = `
      <strong>${el.element_name}</strong><br>
      <small>${el.category || "Discovered"}</small><br>
      <span>${el.description || "Player discovered element"}</span>
    `;
    list.appendChild(div);
  });
};

/* Add to encyclopedia */
function appendEncyclopedia(el) {
  if (!el) return;
  // prevent duplicates by element_name
  const exists = encyclopediaCache.some(
    item => item.element_name === el.element_name
  );
  if (exists) return;
  encyclopediaCache.push(el);
  const list = document.getElementById("encyclopediaList");
  if (!list) return;
  const div = document.createElement("div");
  div.style.padding = "10px";
  div.style.marginBottom = "10px";
  div.style.background = "#2d3b66";
  div.style.borderRadius = "10px";
  div.innerHTML = `
    <strong>${el.element_name}</strong><br>
    <small>${el.category || "Discovered"}</small><br>
    <span>${el.description || "Player discovered element"}</span>
  `;

  list.appendChild(div);
}

/* Boundary check */
function isTouchingBoundary(tile) {
  const wr = workspace.getBoundingClientRect();
  const tr = tile.getBoundingClientRect();
  return (
    tr.left <= wr.left ||
    tr.right >= wr.right ||
    tr.top <= wr.top ||
    tr.bottom >= wr.bottom
  );
}

/* DOM refs */
const sidebar = document.getElementById("elementsContainer");
const workspace = document.getElementById("workspace");
const resultDiv = document.getElementById("result");

/* State */
let activeTile = null;
let isDragging = false;
let offsetX = 0;
let offsetY = 0;
let elements = [];
let elementMap = {};
let recipes = {};
let unlockedElements = new Set();

/* Load workspace */
function loadWorkspace() {
  const saved = localStorage.getItem("workspace");
  if (!saved) return;
  const data = JSON.parse(saved);
  data.forEach(item => {
    createTile(item.id, item.x, item.y);
  });
}

/* Init */
window.addEventListener("load", async () => {
  await loadElements();
  await loadRecipes();
  loadWorkspace();
});

/* Save workspace */
function saveWorkspace() {
  const data = [];
  document.querySelectorAll(".tile").forEach(tile => {
    data.push({
      id: tile.dataset.id,
      x: parseFloat(tile.style.left),
      y: parseFloat(tile.style.top)
    });
  });
  localStorage.setItem("workspace", JSON.stringify(data));
}

/* Load elements */
async function loadElements() {
    const { data, error } = await supabase
    .from("elements")
    .select("id, element_name, category, description");
  if (error) {
    console.error(error);
    return;
  }
  elements = data;
  unlockedElements = new Set(
    elements.slice(0, 10).map(e => e.id)
  );
  elementMap = {};
  elements.forEach(e => {
    elementMap[e.id] = e;
  });
  renderSidebar();
}

/* Mouse move */
document.addEventListener("mousemove", (e) => {
  if (!activeTile || !isDragging) return;
  const wr = workspace.getBoundingClientRect();
  const x = e.clientX - wr.left - offsetX;
  const y = e.clientY - wr.top - offsetY;
  activeTile.style.left = `${x}px`;
  activeTile.style.top = `${y}px`;
});

/* Mouse up */
document.addEventListener("mouseup", () => {
  if (!activeTile) return;
  isDragging = false;
  const tiles = document.querySelectorAll(".tile");
  tiles.forEach(other => {
    if (other === activeTile) return;
    if (isColliding(activeTile, other)) {
      combine(activeTile.dataset.id, other.dataset.id, other);
    }
  });
  if (isTouchingBoundary(activeTile)) {
    activeTile.remove();
    }
  activeTile.style.cursor = "grab";
  activeTile = null;
  saveWorkspace();
});

/* Mouse down */
document.addEventListener("mousedown", (e) => {
  if (e.button !== 0) return;
  const tile = e.target.closest(".tile");
  if (!tile) return;
  activeTile = tile;
  isDragging = true;
  const wr = workspace.getBoundingClientRect();
  const rect = tile.getBoundingClientRect();
  // convert everything into workspace coordinates
  offsetX = e.clientX - rect.left;
  offsetY = e.clientY - rect.top;
  tile.style.cursor = "grabbing";
});

/* Collision check */
function isColliding(a, b) {
  const r1 = a.getBoundingClientRect();
  const r2 = b.getBoundingClientRect();
  return !(
    r1.right < r2.left ||
    r1.left > r2.right ||
    r1.bottom < r2.top ||
    r1.top > r2.bottom
  );
}

/* Load recipes (combinations) */
async function loadRecipes() {
  const { data, error } = await supabase
    .from("combinations")
    .select("element1_id, element2_id, result_id");
  if (error) {
    console.error(error);
    return;
  }
  recipes = {};
  data.forEach(r => {
    recipes[`${r.element1_id}+${r.element2_id}`] = r.result_id;
    recipes[`${r.element2_id}+${r.element1_id}`] = r.result_id;
  });
}

/* Render sidebar */
function renderSidebar() {
  sidebar.innerHTML = "";
  elements
    .filter(el => unlockedElements.has(el.id))
    .forEach(el => {
      const div = document.createElement("div");
      div.className = "element";
      div.textContent = el.element_name;
    div.addEventListener("mousedown", (e) => {
        const wr = workspace.getBoundingClientRect();
        const x = e.clientX - wr.left;
        const y = e.clientY - wr.top;
        const tile = createTile(el.id, x, y);
        activeTile = tile;
        isDragging = true;
        const rect = tile.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        tile.style.cursor = "grabbing";
        });
      sidebar.appendChild(div);
    });
}

/* Create tile */
function createTile(id, x, y) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.textContent = elementMap[String(id)]?.element_name ?? id;
  tile.dataset.id = id;
  tile.style.left = x + "px";
  tile.style.top = y + "px";
  tile.addEventListener("mousedown", (e) => {
    activeTile = tile;
    const rect = tile.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    tile.style.cursor = "grabbing";
  });
  workspace.appendChild(tile);
  return tile;
}

/* Combine system */
function combine(id1, id2, targetTile) {
  const resultId = recipes[`${id1}+${id2}`];
  if (!resultId) {
    resultDiv.textContent = "No combo";
    return;
  }
  const rect = targetTile.getBoundingClientRect();
  const wr = workspace.getBoundingClientRect();
  const x = rect.left - wr.left;
  const y = rect.top - wr.top;
  if (activeTile && activeTile !== targetTile) {
    activeTile.remove();
  }
  targetTile.remove();
  createTile(resultId, x, y);
  unlockedElements.add(resultId);
  renderSidebar();
  const newElement = elementMap[resultId];
  if (newElement) {
    appendEncyclopedia(newElement);
  } else {
        console.warn("Encyclopedia append failed: missing element", resultId);
  }
  resultDiv.textContent =
    `${elementMap[id1]} + ${elementMap[id2]} = ${elementMap[resultId]}`;
}

/* Init load */
window.addEventListener("load", async () => {
  await loadElements();
  await loadRecipes();
});

</script>

</body>
</html>
